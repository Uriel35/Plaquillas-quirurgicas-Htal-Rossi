name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements-app.txt
        pip install pyinstaller pyinstaller-hooks-contrib

    - name: Verify deps installed
      run: |
        python -c "import sys; print(sys.version)"
        python -c "import pandas, numpy; print('pandas', pandas.__version__, pandas.__file__); print('numpy', numpy.__version__, numpy.__file__)"

    - name: Build EXE
      run: |
        python -m PyInstaller --clean --noconfirm main.spec

    - name: Verify pandas bundled
      run: |
        python -c "import os, zipfile; d='dist/main/_internal'; p=os.path.join(d,'PYZ-00.pyz'); print('internal dir exists:', os.path.isdir(d)); print('pandas dir exists:', os.path.isdir(os.path.join(d,'pandas'))); print('PYZ path:', p); print('PYZ exists:', os.path.isfile(p));\nif os.path.isfile(p):\n  z=zipfile.ZipFile(p); names=z.namelist();\n  print('pandas in PYZ:', any(n.startswith('pandas/') for n in names))\nelse:\n  print('internal files sample:', sorted(os.listdir(d))[:30] if os.path.isdir(d) else [])"

    - name: Smoke test (imports)
      run: |
        dist\main\main.exe --self-test

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-windows
        path: |
          dist/main
        if-no-files-found: error
